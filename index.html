<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Aimar Merchán — Archivo</title>

<!-- ═══ diagnóstico: solo visible para el administrador logueado ═══ -->
<script>
(function(){
  var errores=[];
  window.__diagAdmin=false;
  function pintar(){
    if(!window.__diagAdmin)return; /* los visitantes nunca ven esto */
    var el=document.getElementById('_diag');
    if(!el){
      el=document.createElement('div');
      el.id='_diag';
      el.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#c0392b;color:#fff;font:12px/1.5 -apple-system,sans-serif;padding:12px 44px 12px 16px;max-height:44vh;overflow:auto;white-space:pre-wrap;box-shadow:0 4px 18px rgba(0,0,0,.4)';
      var cerrar=document.createElement('button');
      cerrar.textContent='✕';
      cerrar.setAttribute('aria-label','Cerrar');
      cerrar.style.cssText='position:fixed;top:8px;right:10px;z-index:100000;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;border:none;font-size:15px;line-height:30px;padding:0';
      cerrar.onclick=function(){ el.style.display='none'; cerrar.style.display='none'; };
      (document.body||document.documentElement).appendChild(cerrar);
      (document.body||document.documentElement).appendChild(el);
    }
    el.style.display='';
    el.textContent='⚠️ '+errores.length+' error(es) — solo lo ves porque eres admin. Toca ✕ para cerrar:\n\n'+errores.join('\n\n');
  }
  window.addEventListener('error',function(e){
    var msg;
    if(e.target&&e.target.tagName&&(e.target.src||e.target.href)){
      msg='No se pudo cargar ('+e.target.tagName+'): '+(e.target.src||e.target.href);
    }else if(e.message&&e.message!=='Script error.'){
      msg=e.message+'  ['+String(e.filename||'?').split('/').pop()+':'+e.lineno+']';
    }else if(e.message==='Script error.'){
      msg='Error dentro de una librería externa (detalle oculto por el navegador)';
    }else{
      return; /* evento sin información útil: se ignora */
    }
    errores.push(msg);pintar();
  },true);
  window.addEventListener('unhandledrejection',function(e){
    errores.push('Promesa rechazada: '+(e.reason&&(e.reason.message||e.reason)||'desconocido'));
    pintar();
  });
  /* admin.js llama a esto cuando confirma si hay sesión de administrador */
  window.__diagActualizar=function(esAdmin){
    window.__diagAdmin=esAdmin;
    if(esAdmin&&errores.length)pintar();
    else{ var el=document.getElementById('_diag'); if(el)el.style.display='none'; }
  };
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@100..125,700..900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<!-- arranque -->
<div id="arranque">
  <div class="mono-g"><span>A</span><span>M</span><span>.</span></div>
  <div class="linea-a"></div>
  <div class="sub-a">Archivo fotográfico</div>
</div>

<!-- menú lateral -->
<div id="velo-menu" onclick="cerrarMenu()"></div>
<aside id="menu">
  <div class="quien">
    <div class="avatar">AM</div>
    <b id="menu-nombre"></b>
    <span id="menu-sub"></span>
  </div>
  <nav>
    <button data-ir="inicio" class="activo">
      <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      Inicio
    </button>
    <button data-ir="galerias">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><circle cx="9" cy="10" r="1.6"/><path d="m5 17 4.5-4.5L13 16l3-3 3 4"/></svg>
      Galerías <span class="num" id="menu-num-gal"></span>
    </button>
    <button data-ir="mapa">
      <svg viewBox="0 0 24 24"><path d="M9 4 3 6.5v13L9 17l6 2.5 6-2.5v-13L15 6.5 9 4z"/><path d="M9 4v13M15 6.5v13"/></svg>
      Mapa <span class="num" id="menu-num-lug"></span>
    </button>
    <button data-ir="cronologia">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
      Cronología
    </button>
  </nav>
  <div class="zona-admin">
    <div class="estado"><i></i><span id="admin-estado">Visitante</span></div>
    <button id="btn-admin" onclick="accionAdmin()">Acceso administrador</button>
  </div>
  <div class="pie-menu">
    <b id="menu-lema"></b><br><br>
    © 2026 <span id="menu-copy"></span>
  </div>
</aside>

<!-- INICIO -->
<div class="pantalla raiz" id="p-inicio">
  <div class="cab-raiz">
    <button class="btn-menu" onclick="abrirMenu()"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg></button>
    <h1 class="disp">Inicio</h1>
    <span class="admin-chip">Admin</span>
  </div>
  <div class="scroll">
    <p class="saludo entra" id="saludo"></p>
    <div id="cifras" class="entra"></div>

    <!-- botón-tarjeta del mapa -->
    <button id="btn-mapa" class="entra" onclick="irRaiz('mapa')">
      <svg class="topo" viewBox="0 0 340 130" preserveAspectRatio="none">
        <path d="M-10,95 C40,70 70,110 120,88 C170,66 200,104 250,84 C300,64 330,96 360,80"/>
        <path d="M-10,60 C50,40 90,78 150,55 C210,32 240,70 300,50 C330,40 350,55 360,48"/>
        <path d="M-10,28 C60,12 100,44 170,26 C240,8 280,40 360,20"/>
      </svg>
      <span class="pin-dot" style="top:24%;left:22%"></span>
      <span class="pin-dot" style="top:52%;left:58%"></span>
      <span class="pin-dot" style="top:30%;left:80%"></span>
      <div class="contenido">
        <div class="txt">
          <span id="btn-mapa-sub">— lugares</span>
          <b>Explorar el mapa</b>
        </div>
        <div class="flecha"><svg viewBox="0 0 24 24"><path d="M5 12h13M13 6.5 18.5 12 13 17.5"/></svg></div>
      </div>
    </button>

    <div class="seccion-cab entra"><h2 class="disp">Galerías recientes</h2><button onclick="irRaiz('galerias')">Ver todas</button></div>
    <div class="carrusel entra" id="recientes"></div>
    <div class="seccion-cab entra"><h2 class="disp">Cronología</h2><button onclick="irRaiz('cronologia')">Ver todo</button></div>
    <div class="carrusel-cron entra" id="inicio-cronologia"></div>
    <div class="seccion-cab entra"><h2 class="disp">Lugares</h2><button onclick="irRaiz('mapa')">Ver mapa</button></div>
    <div id="inicio-lugares" class="entra"></div>
    <p class="lema-pie"><span id="lema-pie-txt"></span></p>
  </div>
</div>

<!-- GALERÍAS -->
<div class="pantalla raiz" id="p-galerias" style="display:none">
  <div class="cab-raiz">
    <button class="btn-menu" onclick="abrirMenu()"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg></button>
    <h1 class="disp">Galerías</h1>
    <button id="btn-reordenar-gal" class="pildora" style="display:none" onclick="alternarReordenarGalerias()">Reordenar</button>
    <span class="admin-chip">Admin</span>
  </div>
  <div class="scroll"><div class="lista-galerias" id="lista-galerias"></div></div>
  <button class="fab" onclick="fabGalerias()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
</div>

<!-- MAPA -->
<div class="pantalla raiz" id="p-mapa" style="display:none">
  <div class="cab-raiz">
    <button class="btn-menu" onclick="abrirMenu()"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg></button>
    <h1 class="disp">Mapa</h1>
    <span class="admin-chip">Admin</span>
  </div>
  <div id="mapa-zona">
    <div id="mapa"></div>
    <div id="mapa-fallback">
      <div class="caja">
        <b>El mapa no se ha podido mostrar</b>
        <span id="mapa-fallback-txt">Comprobando…</span>
        <button onclick="location.reload()">Recargar página</button>
      </div>
    </div>
    <button id="btn-vista-mapa" onclick="alternarVistaMapa()">Satélite</button>
    <div id="aviso-fijar">Toca el mapa para fijar la ubicación <button onclick="cancelarFijado()">Cancelar</button></div>
    <div id="mapa-cartas"></div>
  </div>
  <button class="fab" style="bottom:calc(env(safe-area-inset-bottom) + 118px)" onclick="fabMapa()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
</div>

<!-- CRONOLOGÍA -->
<div class="pantalla raiz" id="p-cronologia" style="display:none">
  <div class="cab-raiz">
    <button class="btn-menu" onclick="abrirMenu()"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg></button>
    <h1 class="disp">Cronología</h1>
    <span class="admin-chip">Admin</span>
  </div>
  <div class="scroll"><div id="cronologia-lista"></div></div>
</div>

<!-- COLECCIÓN -->
<div class="pantalla push" id="p-colec">
  <div class="topbar" id="col-topbar">
    <div class="velo"></div>
    <button class="btn-flot" onclick="volverDeColec()"><svg viewBox="0 0 24 24"><path d="M14.5 5.5 8 12l6.5 6.5"/></svg></button>
    <span class="titulo-mini" id="col-titulo-mini"></span>
    <button class="btn-flot" onclick="abrirHojaColec()"><svg viewBox="0 0 24 24"><circle cx="5.5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="18.5" cy="12" r="1"/></svg></button>
  </div>
  <div class="scroll" id="col-scroll">
    <div id="col-hero">
      <img id="col-cover" alt="" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBTAA7">
      <div class="nombre"><b id="col-nombre"></b><span id="col-sub"></span></div>
    </div>
    <div id="col-media">
      <span class="pildora">Media (<span id="col-n"></span>) <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></span>
      <button id="btn-reordenar" class="pildora" style="display:none" onclick="alternarReordenar()">Reordenar</button>
    </div>
    <div id="col-grid"></div>
  </div>
  <button class="fab" id="fab-colec" onclick="subirFotosAGaleria()"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
</div>

<!-- FOTO visor -->
<div class="pantalla push" id="p-foto">
  <div id="foto-cab">
    <button class="btn-flot" onclick="volverDeFoto()"><svg viewBox="0 0 24 24"><path d="M14.5 5.5 8 12l6.5 6.5"/></svg></button>
    <div class="centro"><b id="foto-archivo"></b><span id="foto-num"></span></div>
    <button class="btn-flot" onclick="abrirHojaInfo()"><svg viewBox="0 0 24 24"><circle cx="5.5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="18.5" cy="12" r="1"/></svg></button>
  </div>
  <div id="foto-zona">
    <div id="foto-carro"></div>
    <div id="peek">Original</div>
  </div>
  <div id="tira"></div>
  <div id="acciones">
    <button id="btn-cmp" onclick="alternarComparador()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 3.5v17M12 8l3.5 4L12 16"/></svg>
      Antes / Después
    </button>
    <div class="sep"></div>
    <button onclick="compartirFoto()">
      <svg viewBox="0 0 24 24"><path d="M12 15V4M8 7.5 12 3.5l4 4"/><path d="M5 12v7a1.5 1.5 0 0 0 1.5 1.5h11A1.5 1.5 0 0 0 19 19v-7"/></svg>
      Compartir
    </button>
    <div class="sep"></div>
    <button onclick="abrirHojaInfo()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 11v5M12 7.8v.2"/></svg>
      Info
    </button>
  </div>
</div>

<div id="velo-hoja" onclick="cerrarHoja()"></div>
<div id="hoja"></div>
<div id="toast"></div>
<div id="progreso-subida"><span class="rueda"></span><span id="progreso-txt">Subiendo…</span></div>

<!-- entradas de archivo ocultas -->
<input type="file" id="input-fotos" accept="image/*" multiple hidden>
<input type="file" id="input-original" accept="image/*" hidden>
<input type="file" id="input-portada" accept="image/*" hidden>

<script src="js/config.js"></script>
<script src="js/datos.js"></script>
<script src="js/app.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
